<svg viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Complete security, hardware, communication and networking solutions">
  <defs>
    <linearGradient id="adPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2fa"/>
    </linearGradient>
    <linearGradient id="adNavy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33508e"/>
      <stop offset="0.5" stop-color="#22355f"/>
      <stop offset="1" stop-color="#16244a"/>
    </linearGradient>
    <linearGradient id="adHub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a5490"/>
      <stop offset="1" stop-color="#16244a"/>
    </linearGradient>
    <linearGradient id="adRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e14a51"/>
      <stop offset="1" stop-color="#a5282f"/>
    </linearGradient>
    <radialGradient id="adBg" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0" stop-color="#f4f7fc"/>
      <stop offset="1" stop-color="#e0e7f2"/>
    </radialGradient>
    <filter id="adShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0c1836" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1200" height="820" fill="url(#adBg)"/>
  <circle cx="600" cy="410" r="330" fill="#ffffff" opacity="0.35"/>

  <!-- connecting arcs from hub to devices -->
  <g stroke="#c3d0e6" stroke-width="4" fill="none" stroke-dasharray="2 12" stroke-linecap="round">
    <path d="M600 410 L300 210"/>
    <path d="M600 410 L900 210"/>
    <path d="M600 410 L300 620"/>
    <path d="M600 410 L900 620"/>
  </g>

  <!-- central hub -->
  <g filter="url(#adShadow)">
    <circle cx="600" cy="410" r="118" fill="url(#adHub)"/>
    <circle cx="600" cy="410" r="118" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  </g>
  <g transform="translate(548 350)">
    <path d="M52 0 L104 22 V58 C104 94 82 116 52 126 C22 116 0 94 0 58 V22 Z" fill="#ffffff"/>
    <path d="M30 62 l15 15 l30 -35" fill="none" stroke="#c9353d" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- device card: CCTV (top-left) -->
  <g filter="url(#adShadow)">
    <rect x="150" y="120" width="200" height="176" rx="22" fill="url(#adPanel)"/>
    <g transform="translate(196 168) rotate(-10 54 40)">
      <rect x="0" y="30" width="96" height="42" rx="21" fill="url(#adNavy)"/>
      <rect x="44" y="20" width="66" height="34" rx="17" fill="#33508e"/>
      <circle cx="104" cy="52" r="24" fill="url(#adRed)"/>
      <circle cx="104" cy="52" r="15" fill="#0f1c3c"/>
    </g>
    <rect x="196" y="256" width="108" height="12" rx="6" fill="#c6d2e6"/>
  </g>

  <!-- device card: Monitor (top-right) -->
  <g filter="url(#adShadow)">
    <rect x="850" y="120" width="200" height="176" rx="22" fill="url(#adPanel)"/>
    <g transform="translate(898 160)">
      <rect x="0" y="0" width="104" height="72" rx="10" fill="url(#adNavy)"/>
      <rect x="10" y="10" width="84" height="52" rx="5" fill="#0d1832"/>
      <rect x="20" y="40" width="12" height="14" rx="2" fill="#4d67a6"/>
      <rect x="38" y="30" width="12" height="24" rx="2" fill="#c9353d"/>
      <rect x="56" y="36" width="12" height="18" rx="2" fill="#4d67a6"/>
      <rect x="42" y="78" width="20" height="12" fill="#22355f"/>
      <rect x="26" y="90" width="52" height="8" rx="4" fill="#33508e"/>
    </g>
    <rect x="896" y="256" width="108" height="12" rx="6" fill="#c6d2e6"/>
  </g>

  <!-- device card: Intercom (bottom-left) -->
  <g filter="url(#adShadow)">
    <rect x="150" y="524" width="200" height="176" rx="22" fill="url(#adPanel)"/>
    <g transform="translate(210 556)">
      <rect x="0" y="0" width="80" height="112" rx="14" fill="url(#adNavy)"/>
      <rect x="14" y="14" width="52" height="30" rx="6" fill="#0d1832"/>
      <g fill="#4d67a6">
        <rect x="14" y="54" width="14" height="12" rx="3"/><rect x="33" y="54" width="14" height="12" rx="3"/><rect x="52" y="54" width="14" height="12" rx="3"/>
        <rect x="14" y="72" width="14" height="12" rx="3"/><rect x="33" y="72" width="14" height="12" rx="3"/><rect x="52" y="72" width="14" height="12" rx="3"/>
      </g>
      <rect x="14" y="92" width="52" height="10" rx="5" fill="#c9353d"/>
    </g>
    <rect x="196" y="660" width="108" height="12" rx="6" fill="#c6d2e6"/>
  </g>

  <!-- device card: Router (bottom-right) -->
  <g filter="url(#adShadow)">
    <rect x="850" y="524" width="200" height="176" rx="22" fill="url(#adPanel)"/>
    <g transform="translate(898 566)">
      <rect x="24" y="-24" width="10" height="34" rx="5" fill="#33508e" transform="rotate(-16 29 -7)"/>
      <rect x="70" y="-24" width="10" height="34" rx="5" fill="#33508e" transform="rotate(16 75 -7)"/>
      <rect x="0" y="6" width="104" height="52" rx="14" fill="url(#adNavy)"/>
      <circle cx="24" cy="32" r="7" fill="#c9353d"/>
      <circle cx="48" cy="32" r="7" fill="#63c38a"/>
      <circle cx="72" cy="32" r="7" fill="#4d67a6"/>
    </g>
    <rect x="896" y="660" width="108" height="12" rx="6" fill="#c6d2e6"/>
  </g>
</svg>
