<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Computer hardware and IT equipment">
  <defs>
    <radialGradient id="hbg" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#f3f6fb"/>
      <stop offset="1" stop-color="#d3ddec"/>
    </radialGradient>
    <linearGradient id="hBezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33508e"/>
      <stop offset="0.5" stop-color="#213a6b"/>
      <stop offset="1" stop-color="#14224a"/>
    </linearGradient>
    <linearGradient id="hScreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24365f"/>
      <stop offset="1" stop-color="#0d1832"/>
    </linearGradient>
    <linearGradient id="hGloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5490"/>
      <stop offset="0.5" stop-color="#22355f"/>
      <stop offset="1" stop-color="#16244a"/>
    </linearGradient>
    <linearGradient id="hTower" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#33508e"/>
      <stop offset="0.5" stop-color="#25396a"/>
      <stop offset="1" stop-color="#15244b"/>
    </linearGradient>
    <filter id="hShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#132043" flood-opacity="0.28"/>
    </filter>
    <filter id="hBlur"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="1200" height="750" fill="url(#hbg)"/>
  <circle cx="255" cy="200" r="160" fill="#ffffff" opacity="0.35"/>
  <circle cx="980" cy="560" r="220" fill="#1c2f5c" opacity="0.05"/>

  <ellipse cx="600" cy="632" rx="360" ry="40" fill="#132043" opacity="0.22" filter="url(#hBlur)"/>

  <!-- monitor -->
  <g filter="url(#hShadow)">
    <rect x="330" y="150" width="540" height="330" rx="24" fill="url(#hBezel)"/>
    <rect x="354" y="174" width="492" height="282" rx="12" fill="url(#hScreen)"/>
    <!-- screen content -->
    <rect x="384" y="206" width="190" height="18" rx="9" fill="#ffffff" opacity="0.9"/>
    <rect x="384" y="238" width="120" height="12" rx="6" fill="#8fa0c8" opacity="0.7"/>
    <g>
      <rect x="384" y="330" width="48" height="92" rx="8" fill="#3a5490"/>
      <rect x="450" y="298" width="48" height="124" rx="8" fill="#4d67a6"/>
      <rect x="516" y="352" width="48" height="70" rx="8" fill="#3a5490"/>
      <rect x="582" y="280" width="48" height="142" rx="8" fill="#c9353d"/>
      <rect x="648" y="334" width="48" height="88" rx="8" fill="#4d67a6"/>
    </g>
    <circle cx="762" cy="250" r="54" fill="none" stroke="#c9353d" stroke-width="15"/>
    <path d="M762 250 L762 202 A48 48 0 0 1 805 272 Z" fill="#ffffff" opacity="0.85"/>
    <!-- glossy reflection -->
    <path d="M354 174 h300 l-220 282 h-80 a12 12 0 0 1 -12 -12 Z" fill="url(#hGloss)"/>
    <!-- stand -->
    <path d="M566 480 h68 l16 62 h-100 Z" fill="url(#hMetal)"/>
    <rect x="466" y="540" width="268" height="28" rx="14" fill="url(#hMetal)"/>
    <ellipse cx="600" cy="544" rx="134" ry="7" fill="#ffffff" opacity="0.12"/>
  </g>

  <!-- keyboard -->
  <g filter="url(#hShadow)" transform="translate(356 590)">
    <path d="M0 14 q0 -14 16 -14 h456 q16 0 16 14 l8 76 q0 10 -12 10 h-480 q-12 0 -12 -10 Z" fill="url(#hMetal)"/>
    <g fill="#3f588f">
      <rect x="26" y="20" width="40" height="22" rx="5"/><rect x="78" y="20" width="40" height="22" rx="5"/>
      <rect x="130" y="20" width="40" height="22" rx="5"/><rect x="182" y="20" width="40" height="22" rx="5"/>
      <rect x="234" y="20" width="40" height="22" rx="5"/><rect x="286" y="20" width="40" height="22" rx="5"/>
      <rect x="338" y="20" width="40" height="22" rx="5"/><rect x="390" y="20" width="72" height="22" rx="5"/>
      <rect x="26" y="54" width="120" height="24" rx="5"/><rect x="158" y="54" width="230" height="24" rx="5" fill="#c9353d" opacity="0.85"/>
      <rect x="400" y="54" width="62" height="24" rx="5"/>
    </g>
  </g>

  <!-- PC tower -->
  <g filter="url(#hShadow)" transform="translate(902 296)">
    <rect x="0" y="0" width="152" height="304" rx="20" fill="url(#hTower)"/>
    <rect x="0" y="0" width="46" height="304" rx="20" fill="#ffffff" opacity="0.06"/>
    <rect x="26" y="30" width="100" height="10" rx="5" fill="#0f1b3a" opacity="0.6"/>
    <rect x="26" y="52" width="100" height="10" rx="5" fill="#0f1b3a" opacity="0.6"/>
    <circle cx="76" cy="118" r="30" fill="#16244a"/>
    <circle cx="76" cy="118" r="30" fill="none" stroke="#3f588f" stroke-width="5"/>
    <circle cx="76" cy="118" r="10" fill="#3f588f"/>
    <circle cx="42" cy="272" r="10" fill="#c9353d"/>
    <circle cx="38" cy="268" r="3" fill="#ffb0b3"/>
    <circle cx="74" cy="272" r="10" fill="#7fd6a2"/>
  </g>
</svg>
