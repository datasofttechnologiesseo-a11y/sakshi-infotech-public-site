<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CCTV security camera">
  <defs>
    <radialGradient id="sbg" cx="0.5" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#f3f6fb"/>
      <stop offset="1" stop-color="#d3ddec"/>
    </radialGradient>
    <linearGradient id="sCyl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182a54"/>
      <stop offset="0.16" stop-color="#2c477f"/>
      <stop offset="0.42" stop-color="#5c7cbd"/>
      <stop offset="0.6" stop-color="#33508e"/>
      <stop offset="1" stop-color="#122043"/>
    </linearGradient>
    <linearGradient id="sHood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33508e"/>
      <stop offset="0.45" stop-color="#6a89c6"/>
      <stop offset="1" stop-color="#22355f"/>
    </linearGradient>
    <linearGradient id="sArm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#33508e"/>
      <stop offset="0.5" stop-color="#22355f"/>
      <stop offset="1" stop-color="#15254c"/>
    </linearGradient>
    <radialGradient id="sLens" cx="0.42" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#2a3f6e"/>
      <stop offset="0.55" stop-color="#0f1c3c"/>
      <stop offset="1" stop-color="#050b1c"/>
    </radialGradient>
    <radialGradient id="sGlass" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e14a51"/>
      <stop offset="1" stop-color="#a5282f"/>
    </linearGradient>
    <filter id="sShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#132043" flood-opacity="0.3"/>
    </filter>
    <filter id="sBlur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="1200" height="750" fill="url(#sbg)"/>
  <circle cx="250" cy="200" r="160" fill="#ffffff" opacity="0.35"/>
  <circle cx="960" cy="560" r="220" fill="#1c2f5c" opacity="0.05"/>

  <!-- soft ground shadow -->
  <ellipse cx="640" cy="628" rx="290" ry="40" fill="#132043" opacity="0.22" filter="url(#sBlur)"/>

  <!-- signal arcs -->
  <g fill="none" stroke="#c9353d" stroke-width="10" stroke-linecap="round">
    <path d="M912 250 a70 70 0 0 1 0 122" opacity="0.95"/>
    <path d="M955 218 a120 120 0 0 1 0 186" opacity="0.6"/>
    <path d="M998 186 a172 172 0 0 1 0 250" opacity="0.32"/>
  </g>

  <g filter="url(#sShadow)">
    <g transform="rotate(-13 640 360)">
      <!-- mount plate -->
      <rect x="292" y="292" width="52" height="168" rx="16" fill="url(#sArm)"/>
      <ellipse cx="318" cy="300" rx="30" ry="12" fill="#3a5691"/>
      <!-- arm -->
      <rect x="336" y="350" width="150" height="46" rx="23" fill="url(#sArm)"/>
      <!-- barrel -->
      <rect x="430" y="288" width="410" height="150" rx="75" fill="url(#sCyl)"/>
      <!-- barrel end cap -->
      <ellipse cx="838" cy="363" rx="24" ry="75" fill="#101f40"/>
      <!-- hood -->
      <rect x="602" y="256" width="272" height="120" rx="60" fill="url(#sHood)"/>
      <ellipse cx="738" cy="266" rx="120" ry="16" fill="#ffffff" opacity="0.18"/>
      <!-- brand seam -->
      <rect x="486" y="352" width="330" height="10" rx="5" fill="#0f1c3c" opacity="0.5"/>
      <rect x="486" y="330" width="120" height="8" rx="4" fill="#c9353d" opacity="0.85"/>
      <!-- lens -->
      <circle cx="838" cy="363" r="82" fill="url(#sRing)"/>
      <circle cx="838" cy="363" r="70" fill="url(#sLens)"/>
      <circle cx="838" cy="363" r="70" fill="url(#sGlass)"/>
      <circle cx="838" cy="363" r="34" fill="#0a132b"/>
      <circle cx="812" cy="337" r="12" fill="#ffffff" opacity="0.75"/>
      <!-- rec light -->
      <circle cx="505" cy="312" r="13" fill="#c9353d"/>
      <circle cx="501" cy="308" r="4" fill="#ffb0b3" opacity="0.9"/>
    </g>
  </g>

  <!-- shield badge -->
  <g filter="url(#sShadow)" transform="translate(292 452)">
    <path d="M58 0 L116 25 V68 C116 108 92 135 58 147 C24 135 0 108 0 68 V25 Z" fill="url(#sHood)"/>
    <path d="M33 72 l17 17 l33 -39" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
